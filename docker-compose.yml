services:
  web:
    build: .
    ports:
      - "8080:80"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      APP_TIMEZONE: Europe/Moscow
      SESSION_NAME: chess_rewards_local
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: chess_rewards
      DB_USERNAME: chess_user
      DB_PASSWORD: chess_password
      DB_CHARSET: utf8mb4
      INSTALLER_ENABLED: "true"
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: chess_rewards
      MYSQL_USER: chess_user
      MYSQL_PASSWORD: chess_password
      MYSQL_ROOT_PASSWORD: root_password
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - chess_mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - ./database/demo.sql:/docker-entrypoint-initdb.d/03-demo.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  chess_mysql_data:

